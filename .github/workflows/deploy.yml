name: CI/CD Pipeline for Hello DevOps


on:
  push:
    branches:
      - main

jobs:
  
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/hellodevops:latest

  
  deploy-to-aws:
    runs-on: ubuntu-latest
    needs: build-and-push 
    steps:
      - name: Deploy via SSH to AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_SERVER_IP }}
          username: ubuntu 
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 1. Eğer eski bir container varsa onu durdur ve sil (Hata vermemesi için || true diyoruz)
            sudo docker stop my-devops-app || true
            sudo docker rm my-devops-app || true
            
            # 2. Docker Hub'dan en güncel imajı çek
            sudo docker pull oguzhandeveci/hello-devops:latest
            
            # 3. Yeni container'ı 3000 portundan ayağa kaldır
            sudo docker run -d -p 3000:3000 --name my-devops-app oguzhandeveci/hello-devops:latest